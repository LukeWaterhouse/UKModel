<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Panel frame -->
  <rect x="8" y="18" width="48" height="30" rx="2" fill="#1a3a5c" stroke="#333" stroke-width="1.5" transform="rotate(-10 32 33)"/>
  <!-- Grid lines -->
  <line x1="12" y1="33" x2="52" y2="27" stroke="#4a9eff" stroke-width="0.8" transform="rotate(-10 32 33)"/>
  <line x1="24" y1="16" x2="24" y2="50" stroke="#4a9eff" stroke-width="0.8" transform="rotate(-10 32 33)"/>
  <line x1="40" y1="16" x2="40" y2="50" stroke="#4a9eff" stroke-width="0.8" transform="rotate(-10 32 33)"/>
  <!-- Stand -->
  <rect x="30" y="48" width="4" height="12" fill="#999" stroke="#333" stroke-width="1"/>
  <!-- Base -->
  <rect x="24" y="56" width="16" height="4" rx="1" fill="#999" stroke="#333" stroke-width="1"/>
  <!-- Sun reflection -->
  <circle cx="20" cy="24" r="3" fill="#f5c518" opacity="0.5"/>
</svg>
